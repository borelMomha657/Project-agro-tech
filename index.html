<!DOCTYPE html>
<html>
<head>
    <title>AgroStat Railway</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-success text-center">🚜 AgroStat - Collecte & Analyse</h1>
        
        <div class="row mt-4">
            <div class="col-md-4 card p-4 shadow-sm">
                <h3>Collecte</h3>
                <form action="/collecte" method="post">
                    <label>Culture</label>
                    <select name="culture" class="form-control mb-2">
                        <option>Maïs</option><option>Manioc</option><option>Cacao</option>
                    </select>
                    <input type="number" name="prix" placeholder="Prix (FCFA)" class="form-control mb-2" required>
                    <input type="number" name="humidite" placeholder="Humidité (%)" class="form-control mb-2">
                    <input type="text" name="zone" placeholder="Zone" class="form-control mb-2" required>
                    <button type="submit" class="btn btn-success w-100">Enregistrer</button>
                </form>
            </div>

            <div class="col-md-8">
                <div class="row text-center mb-3">
                    <div class="col"><div class="card p-2">Total: {{ stats.total or 0 }}</div></div>
                    <div class="col"><div class="card p-2">Prix Moyen: {{ stats.prix_moyen or 0 }}</div></div>
                </div>
                <table class="table table-striped bg-white shadow-sm">
                    <thead><tr><th>Culture</th><th>Prix</th><th>Zone</th></tr></thead>
                    <tbody>
                        {% for row in data %}
                        <tr><td>{{ row.culture }}</td><td>{{ row.prix }}</td><td>{{ row.zone }}</td></tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
